<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Vocabulary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
        }
        .font-display {
            font-family: 'Fraunces', serif;
        }
        .flip-card { 
            perspective: 1000px; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        .flip-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        .flip-card.is-flipped .flip-inner { 
            transform: rotateY(180deg); 
        }
        .flip-front, .flip-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            background-color: white;
        }
        .flip-back { 
            transform: rotateY(180deg); 
            background-color: #f8fafc;
        }
        .mode-btn {
            transition: all 0.3s ease;
        }
        .mode-btn.active { 
            transform: scale(1.05); 
            background-color: #f59e0b; 
            color: white;
            border-color: #f59e0b;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex flex-col items-center px-4 py-8 md:py-12 text-slate-800">
    
    <header class="text-center mb-8 w-full max-w-2xl">
        <h1 class="font-display text-4xl md:text-5xl font-bold text-indigo-900 mb-2">Animal Vocabulary</h1>
        <p class="text-slate-600 text-lg">Learn animals with fun flashcards and quizzes!</p>
    </header>

    <main class="w-full max-w-md md:max-w-lg flex flex-col items-center bg-white/60 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-lg border border-white">
        
        <div class="flex gap-3 mb-8 bg-white p-1.5 rounded-full shadow-sm border border-slate-100">
            <button id="btn-flashcard" class="px-6 py-2.5 rounded-full font-semibold mode-btn active text-slate-600 border border-transparent hover:bg-slate-50" onclick="setMode('flash')">Flashcards</button> 
            <button id="btn-quiz" class="px-6 py-2.5 rounded-full font-semibold mode-btn text-slate-600 border border-transparent hover:bg-slate-50" onclick="setMode('quiz')">Quiz Mode</button>
        </div>

        <div id="flash-mode" class="w-full flex flex-col items-center">
            <div class="flip-card w-64 h-72 md:w-72 md:h-80 mx-auto" onclick="this.classList.toggle('is-flipped')">
                <div class="flip-inner shadow-xl rounded-3xl">
                    <div class="flip-front border-2 border-indigo-50">
                        <span id="flash-emoji" class="text-8xl mb-4 drop-shadow-md"></span> 
                        <span class="text-sm font-medium text-slate-400 uppercase tracking-widest">Tap to flip</span>
                    </div>
                    <div class="flip-back border-2 border-indigo-100">
                        <span id="flash-name" class="text-4xl font-display font-bold text-indigo-900"></span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-6 mt-8">
                <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-md text-indigo-600 hover:bg-indigo-50 hover:scale-105 transition-all font-bold text-xl" onclick="navCard(-1)">←</button> 
                <span id="card-counter" class="font-bold text-slate-500 min-w-[3rem] text-center">1/12</span> 
                <button class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-600 shadow-md text-white hover:bg-indigo-700 hover:scale-105 transition-all font-bold text-xl" onclick="navCard(1)">→</button>
            </div>
        </div>

        <div id="quiz-mode" class="w-full flex flex-col items-center hidden">
            <div class="w-64 h-48 md:w-72 md:h-56 bg-white border-2 border-indigo-50 rounded-3xl shadow-xl flex items-center justify-center mb-6">
                <span id="quiz-emoji" class="text-8xl drop-shadow-md"></span>
            </div>
            
            <h3 class="text-lg font-medium text-slate-600 mb-4">Which animal is this?</h3>
            <div id="quiz-options" class="grid grid-cols-2 gap-3 w-full"></div>
            
            <div class="mt-6 px-6 py-2 bg-indigo-100 rounded-full text-indigo-800 font-bold">
                <span id="quiz-score">Score: 0/0</span>
            </div>
        </div>
    </main>

    <script>
        const animals = [
            {emoji:'🐶',name:'Dog'},{emoji:'🐱',name:'Cat'},{emoji:'🐘',name:'Elephant'},
            {emoji:'🦁',name:'Lion'},{emoji:'🐸',name:'Frog'},{emoji:'🦋',name:'Butterfly'},
            {emoji:'🐬',name:'Dolphin'},{emoji:'🦅',name:'Eagle'},{emoji:'🐢',name:'Turtle'},
            {emoji:'🦊',name:'Fox'},{emoji:'🐧',name:'Penguin'},{emoji:'🦜',name:'Parrot'}
        ];
        let idx = 0, score = 0, total = 0;
        let isProcessingQuiz = false;

        function showCard() {
            document.getElementById('flash-emoji').textContent = animals[idx].emoji;
            document.getElementById('flash-name').textContent = animals[idx].name;
            document.getElementById('card-counter').textContent = `${idx + 1}/${animals.length}`;
            document.querySelector('.flip-card').classList.remove('is-flipped');
        }

        function navCard(d) {
            idx = (idx + d + animals.length) % animals.length;
            showCard();
        }

        function setMode(m) {
            document.getElementById('flash-mode').classList.toggle('hidden', m === 'quiz');
            document.getElementById('quiz-mode').classList.toggle('hidden', m === 'flash');
            
            document.getElementById('btn-flashcard').classList.toggle('active', m === 'flash');
            document.getElementById('btn-quiz').classList.toggle('active', m === 'quiz');
            
            if (m === 'quiz') {
                score = 0; 
                total = 0; 
                document.getElementById('quiz-score').textContent = `Score: 0/0`;
                newQuiz();
            }
        }

        function newQuiz() {
            isProcessingQuiz = false;
            const correct = animals[Math.floor(Math.random() * animals.length)];
            document.getElementById('quiz-emoji').textContent = correct.emoji;
            
            let opts = [correct];
            while(opts.length < 4) {
                const r = animals[Math.floor(Math.random() * animals.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.textContent = o.name;
                btn.className = 'py-3 px-4 rounded-xl font-semibold text-slate-700 bg-white border-2 border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all active:scale-95';
                
                btn.onclick = () => {
                    if (isProcessingQuiz) return; // Mencegah klik ganda
                    isProcessingQuiz = true;
                    total++;
                    
                    if (o === correct) {
                        score++;
                        btn.classList.add('!bg-green-100', '!border-green-500', '!text-green-800');
                    } else {
                        btn.classList.add('!bg-red-100', '!border-red-400', '!text-red-800');
                        // Tunjukkan jawaban yang benar
                        Array.from(container.children).forEach(childBtn => {
                            if (childBtn.textContent === correct.name) {
                                childBtn.classList.add('!bg-green-100', '!border-green-500', '!text-green-800');
                            }
                        });
                    }
                    
                    document.getElementById('quiz-score').textContent = `Score: ${score}/${total}`;
                    setTimeout(newQuiz, 1200); // Memberi waktu agar pengguna bisa melihat hasilnya
                };
                container.appendChild(btn);
            });
        }

        // Inisialisasi awal
        showCard();
    </script>
</body>
</html>
